<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawson Budget</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, arrayUnion, increment } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDj8wkC8yyTsqwsvpCE_9tg2qzg2wP4zJQ",
            authDomain: "budget-tracker-edb31.firebaseapp.com",
            projectId: "budget-tracker-edb31",
            storageBucket: "budget-tracker-edb31.firebasestorage.app",
            messagingSenderId: "159580306838",
            appId: "1:159580306838:web:876ddd3da9cb2984dcb1b7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.fs = { collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, arrayUnion, increment };
    </script>
</head>
<body style="margin:0; background: #0f0f13; font-family: -apple-system, sans-serif; color: #e8e8f0;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const formatMoney = (n) => "$" + Number(n).toFixed(2);

        function App() {
            const [envelopes, setEnvelopes] = useState([]);
            const [view, setView] = useState("dashboard");
            const [activeId, setActiveId] = useState(null);
            const [showAdd, setShowAdd] = useState(false);
            const [showSpend, setShowSpend] = useState(false);
            const [newEnv, setNewEnv] = useState({ name: "", budget: "" });
            const [newTx, setNewTx] = useState({ desc: "", amount: "" });
            const hasCheckedReset = useRef(false);

            useEffect(() => {
                if (!window.db) return;
                const unsub = window.fs.onSnapshot(window.fs.collection(window.db, "envelopes"), async (snapshot) => {
                    const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    
                    const now = new Date();
                    const day = now.getDay();
                    const diff = (day >= 5) ? (day - 5) : (day + 2); 
                    const lastFriday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - diff);
                    lastFriday.setHours(0,0,0,0);
                    const resetKey = lastFriday.getTime();

                    if (!hasCheckedReset.current && docs.length > 0) {
                        hasCheckedReset.current = true;
                        for (const env of docs) {
                            if (!env.lastReset || env.lastReset < resetKey) {
                                const remaining = (env.budget || 0) - (env.spent || 0);
                                await window.fs.updateDoc(window.fs.doc(window.db, "envelopes", env.id), {
                                    budget: (env.baseBudget || 0) + (remaining > 0 ? remaining : 0),
                                    spent: 0,
                                    lastReset: resetKey,
                                    transactions: [] 
                                });
                            }
                        }
                    }
                    setEnvelopes(docs);
                });
                return () => unsub();
            }, []);

            const activeEnv = envelopes.find(e => e.id === activeId);
            const totalRemaining = envelopes.reduce((acc, env) => acc + (env.budget - env.spent), 0);

            async function handleCreate() {
                if (!newEnv.name || !newEnv.budget) return;
                const b = parseFloat(newEnv.budget);
                await window.fs.addDoc(window.fs.collection(window.db, "envelopes"), {
                    name: newEnv.name, baseBudget: b, budget: b, spent: 0, transactions: [], lastReset: Date.now()
                });
                setNewEnv({ name: "", budget: "" }); setShowAdd(false);
            }

            async function handleSpend() {
                if (!newTx.amount || !activeId) return;
                const amt = parseFloat(newTx.amount);
                const envRef = window.fs.doc(window.db, "envelopes", activeId);
                await window.fs.updateDoc(envRef, {
                    spent: window.fs.increment(amt),
                    transactions: window.fs.arrayUnion({
                        id: Date.now(),
                        desc: newTx.desc || "Purchase",
                        amount: amt,
                        date: new Date().toLocaleDateString()
                    })
                });
                setNewTx({ desc: "", amount: "" }); setShowSpend(false);
            }

            async function handleDeleteTx(txId, amount) {
                if (!confirm("Delete this purchase? The amount will be added back to your balance.")) return;
                const envRef = window.fs.doc(window.db, "envelopes", activeId);
                const updatedTxs = activeEnv.transactions.filter(t => t.id !== txId);
                await window.fs.updateDoc(envRef, {
                    spent: window.fs.increment(-amount),
                    transactions: updatedTxs
                });
            }

            async function handleDeleteEnv(id, e) {
                e.stopPropagation();
                if (confirm("Delete envelope?")) await window.fs.deleteDoc(window.fs.doc(window.db, "envelopes", id));
            }

            const styles = {
                app: { padding: "20px", maxWidth: "500px", margin: "0 auto" },
                header: { textAlign: "center", marginBottom: "30px", padding: "20px 0" },
                totalBox: { background: "linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)", padding: "20px", borderRadius: "16px", marginBottom: "25px", border: "1px solid #333", textAlign: "center" },
                card: { background: "#1e1e2e", padding: "20px", borderRadius: "16px", marginBottom: "15px", border: "1px solid #333", position: "relative", cursor: "pointer" },
                btn: { width: "100%", padding: "14px", background: "#a78bfa", color: "white", border: "none", borderRadius: "8px", fontWeight: "bold", cursor: "pointer" },
                spendBtn: { background: "#4ECDC4", color: "#0f0f13", border: "none", borderRadius: "6px", padding: "8px 15px", fontWeight: "bold", cursor: "pointer" },
                input: { width: "100%", padding: "12px", marginBottom: "10px", borderRadius: "8px", border: "1px solid #444", background: "#000", color: "#fff", boxSizing: "border-box" },
                modal: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.95)", display: "flex", alignItems: "center", justifyContent: "center", padding: "20px", zIndex: 100 }
            };

            return (
                <div style={styles.app}>
                    <header style={styles.header}>
                        <h1 style={{margin:0, fontSize: "28px", letterSpacing: "-1px"}}>Lawson Budget</h1>
                        <p style={{color: "#888", fontSize: "14px", marginTop: "5px"}}>Friday Reset • Atomic Sync</p>
                    </header>

                    {view === "dashboard" ? (
                        <>
                            <div style={styles.totalBox}>
                                <div style={{fontSize: "12px", color: "#888", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "5px"}}>Total Available</div>
                                <div style={{fontSize: "36px", fontWeight: "800", color: totalRemaining < 0 ? "#ff6b6b" : "#fff"}}>
                                    {formatMoney(totalRemaining)}
                                </div>
                            </div>

                            {envelopes.map(env => (
                                <div key={env.id} style={styles.card} onClick={() => { setActiveId(env.id); setView("details"); }}>
                                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                                        <span style={{fontWeight:"bold", fontSize:"18px"}}>{env.name}</span>
                                        <button onClick={(e) => handleDeleteEnv(env.id, e)} style={{background:"none", border:"none", color:"#444", cursor:"pointer", fontSize: "18px"}}>✕</button>
                                    </div>
                                    <div style={{fontSize: "32px", margin: "10px 0", fontWeight: "700", color: (env.budget - env.spent) < 0 ? "#ff6b6b" : "#4ECDC4"}}>
                                        {formatMoney(env.budget - env.spent)}
                                    </div>
                                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                                        <div style={{fontSize:"12px", color:"#888"}}>Limit: {formatMoney(env.budget)}</div>
                                        <button style={styles.spendBtn} onClick={(e) => { e.stopPropagation(); setActiveId(env.id); setShowSpend(true); }}>Spend</button>
                                    </div>
                                </div>
                            ))}
                            <button style={{...styles.btn, background: "rgba(255,255,255,0.05)", border: "1px dashed #444"}} onClick={() => setShowAdd(true)}>+ Add Envelope</button>
                        </>
                    ) : (
                        <div>
                            <button onClick={() => setView("dashboard")} style={{color:"#a78bfa", background:"none", border:"none", cursor:"pointer", padding: "10px 0", fontSize: "16px"}}>← All Envelopes</button>
                            <h2 style={{fontSize: "24px", marginBottom: "10px"}}>{activeEnv?.name}</h2>
                            <div style={{marginBottom: "20px", color: "#888"}}>Weekly History</div>
                            
                            {activeEnv?.transactions?.length === 0 && <p style={{color: "#555"}}>No transactions recorded yet.</p>}
                            
                            {activeEnv?.transactions?.slice().reverse().map(t => (
                                <div key={t.id} style={{...styles.card, cursor: "default", display:"flex", justifyContent:"space-between", alignItems: "center", padding: "15px"}}>
                                    <div>
                                        <div style={{fontWeight: "600"}}>{t.desc}</div>
                                        <div style={{fontSize:"11px", color:"#888"}}>{t.date}</div>
                                    </div>
                                    <div style={{display: "flex", alignItems: "center", gap: "15px"}}>
                                        <div style={{fontSize: "18px", fontWeight: "700", color:"#ff6b6b"}}>-{formatMoney(t.amount)}</div>
                                        <button onClick={() => handleDeleteTx(t.id, t.amount)} style={{background: "rgba(255,71,87,0.1)", border: "none", borderRadius: "4px", color: "#ff4757", padding: "4px 8px", cursor: "pointer", fontSize: "12px"}}>✕</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Modals */}
                    {(showAdd || showSpend) && (
                        <div style={styles.modal}>
                            <div style={{...styles.card, width: "100%", cursor: "default"}}>
                                <h3 style={{marginTop: 0}}>{showAdd ? "New Envelope" : `Spend from ${activeEnv?.name}`}</h3>
                                <input style={styles.input} autoFocus
                                    placeholder={showAdd ? "Name" : "Store/Reason"} 
                                    onChange={e => showAdd ? setNewEnv({...newEnv, name: e.target.value}) : setNewTx({...newTx, desc: e.target.value})} 
                                />
                                <input style={styles.input} type="number" step="0.01"
                                    placeholder="Amount ($)" 
                                    onChange={e => showAdd ? setNewEnv({...newEnv, budget: e.target.value}) : setNewTx({...newTx, amount: e.target.value})} 
                                />
                                <button style={styles.btn} onClick={showAdd ? handleCreate : handleSpend}>Confirm</button>
                                <button onClick={() => { setShowAdd(false); setShowSpend(false); }} style={{width:"100%", marginTop:"10px", background:"none", border:"none", color:"#888", cursor: "pointer"}}>Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
