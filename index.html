<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lawson Budget</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, arrayUnion, increment, writeBatch, setDoc, getDoc } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDj8wkC8yyTsqwsvpCE_9tg2qzg2wP4zJQ",
            authDomain: "budget-tracker-edb31.firebaseapp.com",
            projectId: "budget-tracker-edb31",
            storageBucket: "budget-tracker-edb31.firebasestorage.app",
            messagingSenderId: "159580306838",
            appId: "1:159580306838:web:25ac3bacae328373dcb1b7",
            measurementId: "G-NPLMZ6JQ96"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.fs = { collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, arrayUnion, increment, writeBatch, setDoc, getDoc };
    </script>
</head>
<body style="margin:0; background: #0b0b0f; font-family: 'Inter', sans-serif; color: #ffffff; -webkit-font-smoothing: antialiased;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const formatMoney = (n) => "$" + Number(n).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        const CATEGORIES = ["Daily", "Bills", "Fun", "Household", "Savings", "Other"];
        const WEEKS = ["Week 1", "Week 2", "Week 3", "Week 4"];

        function App() {
            const [envelopes, setEnvelopes] = useState([]);
            const [bills, setBills] = useState([]);
            const [balances, setBalances] = useState({ bank: 0, credit: 0, savings: 0 });
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState("dashboard"); 
            const [activeId, setActiveId] = useState(null);
            
            const [showAdd, setShowAdd] = useState(false);
            const [showSpend, setShowSpend] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [showBillAdd, setShowBillAdd] = useState(false);
            
            const [newEnv, setNewEnv] = useState({ name: "", budget: "", category: "Daily" });
            const [newTx, setNewTx] = useState({ desc: "", amount: "" });
            const [newBill, setNewBill] = useState({ name: "", amount: "", week: "Week 1", dueDay: "" });
            const [editEnv, setEditEnv] = useState({ id: "", name: "", baseBudget: 0, category: "Daily" });

            useEffect(() => {
                if (!window.db) return;
                const unsubEnv = window.fs.onSnapshot(window.fs.collection(window.db, "envelopes"), (snapshot) => {
                    setEnvelopes(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubBills = window.fs.onSnapshot(window.fs.collection(window.db, "bills"), (snapshot) => {
                    setBills(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubBal = window.fs.onSnapshot(window.fs.doc(window.db, "meta", "balances"), (doc) => {
                    if (doc.exists()) setBalances(doc.data());
                    setLoading(false);
                });
                return () => { unsubEnv(); unsubBills(); unsubBal(); };
            }, []);

            const totalRemaining = envelopes.reduce((acc, env) => acc + (env.budget - env.spent), 0);
            const groupedEnvelopes = envelopes.reduce((acc, env) => {
                const cat = env.category || "Other";
                if (!acc[cat]) acc[cat] = [];
                acc[cat].push(env);
                return acc;
            }, {});

            // LOGIC: Determine current week of the month
            const getCurrentWeek = () => {
                const day = new Date().getDate();
                if (day <= 7) return "Week 1";
                if (day <= 14) return "Week 2";
                if (day <= 21) return "Week 3";
                return "Week 4";
            };
            const currentWeekTag = getCurrentWeek();

            async function updateBalance(key, val) {
                await window.fs.setDoc(window.fs.doc(window.db, "meta", "balances"), { ...balances, [key]: parseFloat(val) || 0 });
            }

            async function handleAddBill() {
                if(!newBill.name || !newBill.amount || !newBill.dueDay) return;
                await window.fs.addDoc(window.fs.collection(window.db, "bills"), { 
                    ...newBill, 
                    amount: parseFloat(newBill.amount),
                    dueDay: parseInt(newBill.dueDay)
                });
                setShowBillAdd(false);
                setNewBill({ name: "", amount: "", week: "Week 1", dueDay: "" });
            }

            const styles = {
                app: { padding: "20px", maxWidth: "480px", margin: "0 auto", paddingBottom: "100px" },
                balGrid: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "10px", marginBottom: "20px" },
                balItem: { background: "rgba(255,255,255,0.05)", padding: "12px", borderRadius: "15px", textAlign: "center", border: "1px solid rgba(255,255,255,0.08)" },
                totalCard: { background: "linear-gradient(135deg, #6366f1 0%, #a855f7 100%)", padding: "24px", borderRadius: "20px", marginBottom: "20px" },
                card: { background: "rgba(255, 255, 255, 0.04)", padding: "20px", borderRadius: "20px", marginBottom: "12px", border: "1px solid rgba(255, 255, 255, 0.08)" },
                activeWeekCard: { border: "2px solid #a855f7", boxShadow: "0 0 15px rgba(168, 85, 247, 0.3)", position: "relative" },
                input: { width: "100%", padding: "14px", background: "#000", border: "1px solid #333", color: "#fff", borderRadius: "12px", marginBottom: "10px", boxSizing: "border-box" }
            };

            if (loading) return <div style={{height: "100vh", display: "flex", alignItems: "center", justifyContent: "center"}}><h3>Syncing...</h3></div>;

            return (
                <div style={styles.app}>
                    <header style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px'}}>
                        <h1 style={{margin:0, fontSize: "22px", fontWeight: "800"}} onClick={() => setView("dashboard")}>Lawson</h1>
                        <div style={{display: 'flex', gap: '8px'}}>
                            <button onClick={() => setView("bills")} style={{background: view === "bills" ? "#6366f1" : "rgba(255,255,255,0.1)", border: "none", color: "#fff", padding: "8px 12px", borderRadius: "10px"}}>📅</button>
                            <button onClick={() => setView("stats")} style={{background: view === "stats" ? "#6366f1" : "rgba(255,255,255,0.1)", border: "none", color: "#fff", padding: "8px 12px", borderRadius: "10px"}}>📊</button>
                            <button onClick={() => setView("settings")} style={{background: view === "settings" ? "#6366f1" : "rgba(255,255,255,0.1)", border: "none", color: "#fff", padding: "8px 12px", borderRadius: "10px"}}>⚙️</button>
                        </div>
                    </header>

                    {view === "dashboard" && (
                        <>
                            <div style={styles.balGrid}>
                                <div style={styles.balItem}><div style={{fontSize:"10px", color:"#888"}}>BANK</div><div style={{fontWeight:"700", fontSize:"13px"}}>{formatMoney(balances.bank)}</div></div>
                                <div style={styles.balItem}><div style={{fontSize:"10px", color:"#888"}}>CREDIT</div><div style={{fontWeight:"700", fontSize:"13px", color:"#ff6b6b"}}>{formatMoney(balances.credit)}</div></div>
                                <div style={styles.balItem}><div style={{fontSize:"10px", color:"#888"}}>SAVINGS</div><div style={{fontWeight:"700", fontSize:"13px", color:"#4ECDC4"}}>{formatMoney(balances.savings)}</div></div>
                            </div>
                            <div style={styles.totalCard}>
                                <div style={{fontSize: "12px", fontWeight: "600", opacity: 0.8}}>REMAINING ENVELOPE CASH</div>
                                <div style={{fontSize: "36px", fontWeight: "800", marginTop: "4px"}}>{formatMoney(totalRemaining)}</div>
                            </div>
                            <button onClick={() => setShowAdd(true)} style={{width:"100%", padding:"14px", background:"#fff", color:"#000", border:"none", borderRadius:"15px", fontWeight:"700", marginBottom:"20px"}}>+ New Weekly Envelope</button>
                            {Object.entries(groupedEnvelopes).map(([category, items]) => (
                                <div key={category}>
                                    <div style={{fontSize:"11px", fontWeight:"800", color:"#6366f1", marginBottom:"10px", letterSpacing:"1px"}}>{category.toUpperCase()}</div>
                                    {items.map(env => (
                                        <div key={env.id} style={styles.card} onClick={() => { setActiveId(env.id); setView("details"); }}>
                                            <div style={{display:"flex", justifyContent:"space-between"}}>
                                                <span style={{fontWeight:"700"}}>{env.name}</span>
                                                <span style={{fontSize:"12px", color:"#888"}}>{formatMoney(env.budget)} limit</span>
                                            </div>
                                            <div style={{fontSize: "26px", fontWeight: "800", margin: "10px 0", color: (env.budget - env.spent) < 0 ? "#ff6b6b" : "#fff"}}>{formatMoney(env.budget - env.spent)}</div>
                                            <button style={{background: "#fff", color: "#000", border: "none", borderRadius: "8px", padding: "6px 12px", fontWeight: "700", fontSize:"12px"}} onClick={(e) => { e.stopPropagation(); setActiveId(env.id); setShowSpend(true); }}>Spend</button>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </>
                    )}

                    {view === "bills" && (
                        <div>
                            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"20px"}}>
                                <h2 style={{margin:0}}>Monthly Bills</h2>
                                <button onClick={() => setShowBillAdd(true)} style={{background:"#6366f1", border:"none", color:"#fff", padding:"8px 15px", borderRadius:"10px", fontWeight:"600"}}>+ Add Bill</button>
                            </div>
                            {WEEKS.map(week => (
                                <div key={week} style={{
                                    marginBottom:"25px", 
                                    padding: week === currentWeekTag ? "15px" : "0",
                                    borderRadius: "20px",
                                    background: week === currentWeekTag ? "rgba(168, 85, 247, 0.05)" : "transparent",
                                    border: week === currentWeekTag ? "1px solid rgba(168, 85, 247, 0.3)" : "none"
                                }}>
                                    <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px"}}>
                                        <div style={{color: week === currentWeekTag ? "#a855f7" : "#555", fontWeight:"800", fontSize:"13px", letterSpacing: "1px"}}>{week.toUpperCase()}</div>
                                        {week === currentWeekTag && <span style={{fontSize: "9px", background: "#a855f7", color: "#fff", padding: "3px 8px", borderRadius: "20px", fontWeight: "900"}}>THIS WEEK</span>}
                                    </div>
                                    {bills.filter(b => b.week === week).sort((a,b) => a.dueDay - b.dueDay).map(bill => (
                                        <div key={bill.id} style={{...styles.card, background: week === currentWeekTag ? "rgba(255,255,255,0.08)" : "rgba(255,255,255,0.04)", display:"flex", justifyContent:"space-between", alignItems:"center", padding:"15px", marginBottom:"8px"}}>
                                            <div style={{display:"flex", alignItems:"center", gap:"12px"}}>
                                                <div style={{background: week === currentWeekTag ? "#a855f7" : "#222", width:"35px", height:"35px", borderRadius:"10px", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"14px", fontWeight:"800", color: week === currentWeekTag ? "#fff" : "#6366f1"}}>
                                                    {bill.dueDay}
                                                </div>
                                                <div>
                                                    <div style={{fontWeight:"600", fontSize:"15px"}}>{bill.name}</div>
                                                    <div style={{fontSize:"12px", color:"#888"}}>{formatMoney(bill.amount)}</div>
                                                </div>
                                            </div>
                                            <button onClick={() => deleteBill(bill.id)} style={{background:"none", border:"none", color:"#444", fontSize:"18px"}}>✕</button>
                                        </div>
                                    ))}
                                    {bills.filter(b => b.week === week).length === 0 && <div style={{fontSize:"12px", color:"#333", marginLeft:"5px"}}>No bills scheduled</div>}
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Settings, Stats, and Modals remain identical for stability */}
                    {view === "settings" && (
                        <div>
                            <h2 style={{marginBottom:"20px"}}>Manage Balances</h2>
                            <div style={styles.card}>
                                <label style={{fontSize:"11px", color:"#888", fontWeight:"700"}}>BANK ACCOUNT</label>
                                <input style={{...styles.input, marginTop:"5px"}} type="number" placeholder="0.00" value={balances.bank} onChange={e => updateBalance("bank", e.target.value)} />
                                <label style={{fontSize:"11px", color:"#888", fontWeight:"700"}}>CREDIT CARD TOTAL</label>
                                <input style={{...styles.input, marginTop:"5px"}} type="number" placeholder="0.00" value={balances.credit} onChange={e => updateBalance("credit", e.target.value)} />
                                <label style={{fontSize:"11px", color:"#888", fontWeight:"700"}}>SAVINGS ACCOUNT</label>
                                <input style={{...styles.input, marginTop:"5px"}} type="number" placeholder="0.00" value={balances.savings} onChange={e => updateBalance("savings", e.target.value)} />
                            </div>
                            <button onClick={() => setView("dashboard")} style={{width:"100%", padding:"16px", background:"#fff", color:"#000", border:"none", borderRadius:"15px", fontWeight:"700", marginTop:"10px"}}>Done</button>
                        </div>
                    )}
                    {showBillAdd && (
                        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", display:"flex", alignItems:"flex-end", zIndex:1000}}>
                            <div style={{background:"#16161e", width:"100%", padding:"32px", borderRadius:"32px 32px 0 0", borderTop:"1px solid #333"}}>
                                <h3 style={{marginTop:0, marginBottom:"20px"}}>Add New Monthly Bill</h3>
                                <input style={styles.input} placeholder="Bill Name" value={newBill.name} onChange={e => setNewBill({...newBill, name: e.target.value})} />
                                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px"}}>
                                    <input style={styles.input} type="number" placeholder="Amount ($)" value={newBill.amount} onChange={e => setNewBill({...newBill, amount: e.target.value})} />
                                    <input style={styles.input} type="number" placeholder="Due Day (1-31)" value={newBill.dueDay} onChange={e => setNewBill({...newBill, dueDay: e.target.value})} />
                                </div>
                                <select style={styles.input} value={newBill.week} onChange={e => setNewBill({...newBill, week: e.target.value})}>
                                    {WEEKS.map(w => <option key={w} value={w}>{w}</option>)}
                                </select>
                                <button style={{width:"100%", padding:"16px", background:"#6366f1", color:"#fff", borderRadius:"15px", border:"none", fontWeight:"800", marginTop:"10px"}} onClick={handleAddBill}>Save Bill</button>
                                <button onClick={() => setShowBillAdd(false)} style={{width:"100%", background:"none", border:"none", color:"#888", marginTop:"15px", fontWeight:"600"}}>Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
