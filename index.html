<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lawson Budget</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, arrayUnion, increment } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDj8wkC8yyTsqwsvpCE_9tg2qzg2wP4zJQ",
            authDomain: "budget-tracker-edb31.firebaseapp.com",
            projectId: "budget-tracker-edb31",
            storageBucket: "budget-tracker-edb31.firebasestorage.app",
            messagingSenderId: "159580306838",
            appId: "1:159580306838:web:25ac3bacae328373dcb1b7",
            measurementId: "G-NPLMZ6JQ96"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            window.db = db;
            window.fs = { collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, arrayUnion, increment };
            console.log("Firebase Initialized Successfully");
        } catch (error) {
            console.error("Firebase Initialization Failed:", error);
        }
    </script>
</head>
<body style="margin:0; background: #0f0f13; font-family: -apple-system, sans-serif; color: #e8e8f0;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const formatMoney = (n) => "$" + Number(n).toFixed(2);

        function App() {
            const [envelopes, setEnvelopes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState("dashboard");
            const [activeId, setActiveId] = useState(null);
            const [showAdd, setShowAdd] = useState(false);
            const [showSpend, setShowSpend] = useState(false);
            const [showEdit, setShowEdit] = useState(false);
            
            const [newEnv, setNewEnv] = useState({ name: "", budget: "" });
            const [newTx, setNewTx] = useState({ desc: "", amount: "" });
            const [editEnv, setEditEnv] = useState({ id: "", name: "" });
            
            const hasCheckedReset = useRef(false);

            useEffect(() => {
                if (!window.db) {
                    // Wait a moment for Firebase to attach to window
                    const timer = setTimeout(() => { if(!window.db) alert("Database connection timeout. Refresh page."); }, 5000);
                    return () => clearTimeout(timer);
                }
                
                const unsub = window.fs.onSnapshot(window.fs.collection(window.db, "envelopes"), async (snapshot) => {
                    const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    
                    const now = new Date();
                    const day = now.getDay();
                    const diff = (day >= 5) ? (day - 5) : (day + 2); 
                    const lastFriday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - diff);
                    lastFriday.setHours(0,0,0,0);
                    const resetKey = lastFriday.getTime();

                    if (!hasCheckedReset.current && docs.length > 0) {
                        hasCheckedReset.current = true;
                        for (const env of docs) {
                            if (!env.lastReset || env.lastReset < resetKey) {
                                const remaining = (env.budget || 0) - (env.spent || 0);
                                await window.fs.updateDoc(window.fs.doc(window.db, "envelopes", env.id), {
                                    budget: (env.baseBudget || 0) + (remaining > 0 ? remaining : 0),
                                    spent: 0,
                                    lastReset: resetKey,
                                    transactions: [] 
                                });
                            }
                        }
                    }
                    setEnvelopes(docs);
                    setLoading(false);
                }, (error) => {
                    console.error("Snapshot Error:", error);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            const activeEnv = envelopes.find(e => e.id === activeId);
            const totalRemaining = envelopes.reduce((acc, env) => acc + (env.budget - env.spent), 0);

            async function handleCreate() {
                if (!newEnv.name || !newEnv.budget) return;
                const b = parseFloat(newEnv.budget);
                await window.fs.addDoc(window.fs.collection(window.db, "envelopes"), {
                    name: newEnv.name, baseBudget: b, budget: b, spent: 0, transactions: [], lastReset: Date.now()
                });
                setNewEnv({ name: "", budget: "" }); setShowAdd(false);
            }

            async function handleUpdateName() {
                if (!editEnv.name) return;
                await window.fs.updateDoc(window.fs.doc(window.db, "envelopes", editEnv.id), { name: editEnv.name });
                setShowEdit(false);
            }

            async function handleDeleteEnv() {
                if (confirm(`Delete "${editEnv.name}"?`)) {
                    await window.fs.deleteDoc(window.fs.doc(window.db, "envelopes", editEnv.id));
                    setShowEdit(false);
                    setView("dashboard");
                }
            }

            async function handleSpend() {
                if (!newTx.amount || !activeId) return;
                const amt = parseFloat(newTx.amount);
                await window.fs.updateDoc(window.fs.doc(window.db, "envelopes", activeId), {
                    spent: window.fs.increment(amt),
                    transactions: window.fs.arrayUnion({
                        id: Date.now(),
                        desc: newTx.desc || "Purchase",
                        amount: amt,
                        date: new Date().toLocaleDateString()
                    })
                });
                setNewTx({ desc: "", amount: "" }); setShowSpend(false);
            }

            const styles = {
                app: { padding: "20px", maxWidth: "500px", margin: "0 auto" },
                loading: { height: "100vh", display: "flex", alignItems: "center", justifyContent: "center" },
                card: { background: "#1e1e2e", padding: "20px", borderRadius: "16px", marginBottom: "15px", border: "1px solid #333", position: "relative" },
                btn: { width: "100%", padding: "14px", background: "#a78bfa", color: "white", border: "none", borderRadius: "12px", fontWeight: "bold", cursor: "pointer" },
                input: { width: "100%", padding: "14px", marginBottom: "12px", borderRadius: "10px", border: "1px solid #444", background: "#000", color: "#fff", boxSizing: "border-box" },
                modal: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.95)", display: "flex", alignItems: "center", justifyContent: "center", padding: "20px", zIndex: 100 }
            };

            if (loading) return <div style={styles.loading}><h2>Loading Lawson Budget...</h2></div>;

            return (
                <div style={styles.app}>
                    <header style={{textAlign: "center", marginBottom: "25px"}}>
                        <h1 style={{margin:0}}>✦ Lawson Budget</h1>
                    </header>

                    {view === "dashboard" ? (
                        <>
                            <div style={{background: "linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%)", padding: "24px", borderRadius: "20px", marginBottom: "25px", textAlign: "center", color: "#0f0f13"}}>
                                <div style={{fontSize: "13px", fontWeight: "600", opacity: 0.8}}>AVAILABLE</div>
                                <div style={{fontSize: "42px", fontWeight: "900"}}>{formatMoney(totalRemaining)}</div>
                            </div>

                            {envelopes.map(env => (
                                <div key={env.id} style={styles.card} onClick={() => { setActiveId(env.id); setView("details"); }}>
                                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                                        <span style={{fontWeight:"bold", fontSize:"18px"}}>{env.name}</span>
                                        <button style={{background:"none", border:"none", cursor:"pointer"}} onClick={(e) => { 
                                            e.stopPropagation(); 
                                            setEditEnv({id: env.id, name: env.name});
                                            setShowEdit(true);
                                        }}>⚙️</button>
                                    </div>
                                    <div style={{fontSize: "36px", margin: "12px 0", fontWeight: "800", color: (env.budget - env.spent) < 0 ? "#ff6b6b" : "#4ECDC4"}}>
                                        {formatMoney(env.budget - env.spent)}
                                    </div>
                                    <button style={{...styles.btn, background: "#4ECDC4", color: "#0f0f13", width: "auto", padding: "8px 15px"}} onClick={(e) => { e.stopPropagation(); setActiveId(env.id); setShowSpend(true); }}>Add Purchase</button>
                                </div>
                            ))}
                            <button style={{...styles.btn, background: "transparent", border: "2px dashed #333", color: "#888"}} onClick={() => setShowAdd(true)}>+ New Envelope</button>
                        </>
                    ) : (
                        <div>
                            <div style={{display: 'flex', justifyContent: 'space-between'}}>
                                <button onClick={() => setView("dashboard")} style={{color:"#a78bfa", background:"none", border:"none"}}>← Back</button>
                                <button style={{background:"none", border:"none"}} onClick={() => { setEditEnv({id: activeEnv.id, name: activeEnv.name}); setShowEdit(true); }}>⚙️ Settings</button>
                            </div>
                            <h2 style={{fontSize: "28px", margin: "15px 0"}}>{activeEnv?.name}</h2>
                            <div style={{fontSize: "20px", color: (activeEnv?.budget - activeEnv?.spent) < 0 ? "#ff6b6b" : "#4ECDC4", marginBottom: "20px"}}>{formatMoney(activeEnv?.budget - activeEnv?.spent)} left</div>
                            
                            {activeEnv?.transactions?.slice().reverse().map(t => (
                                <div key={t.id} style={{...styles.card, display:"flex", justifyContent:"space-between", padding: "15px"}}>
                                    <div>{t.desc}<div style={{fontSize:"10px", color:"#888"}}>{t.date}</div></div>
                                    <div style={{color:"#ff6b6b", fontWeight:"bold"}}>-{formatMoney(t.amount)}</div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Modals are simplified for reliability */}
                    {showEdit && (
                        <div style={styles.modal}>
                            <div style={{...styles.card, width: "100%"}}>
                                <h3>Settings</h3>
                                <input style={styles.input} value={editEnv.name} onChange={e => setEditEnv({...editEnv, name: e.target.value})} />
                                <button style={styles.btn} onClick={handleUpdateName}>Save</button>
                                <button style={{...styles.btn, background: "red", marginTop: "10px"}} onClick={handleDeleteEnv}>Delete Envelope</button>
                                <button style={{marginTop: "10px", width: "100%", background: "none", border: "none", color: "#888"}} onClick={() => setShowEdit(false)}>Cancel</button>
                            </div>
                        </div>
                    )}

                    {showAdd && (
                        <div style={styles.modal}>
                            <div style={{...styles.card, width: "100%"}}>
                                <h3>New Envelope</h3>
                                <input style={styles.input} placeholder="Name" onChange={e => setNewEnv({...newEnv, name: e.target.value})} />
                                <input style={styles.input} type="number" placeholder="Weekly Budget" onChange={e => setNewEnv({...newEnv, budget: e.target.value})} />
                                <button style={styles.btn} onClick={handleCreate}>Create</button>
                                <button style={{marginTop: "10px", width: "100%", background: "none", border: "none", color: "#888"}} onClick={() => setShowAdd(false)}>Cancel</button>
                            </div>
                        </div>
                    )}

                    {showSpend && (
                        <div style={styles.modal}>
                            <div style={{...styles.card, width: "100%"}}>
                                <h3>Spend: {activeEnv?.name}</h3>
                                <input style={styles.input} placeholder="Description" onChange={e => setNewTx({...newTx, desc: e.target.value})} />
                                <input style={styles.input} type="number" placeholder="Amount" onChange={e => setNewTx({...newTx, amount: e.target.value})} />
                                <button style={styles.btn} onClick={handleSpend}>Confirm</button>
                                <button style={{marginTop: "10px", width: "100%", background: "none", border: "none", color: "#888"}} onClick={() => setShowSpend(false)}>Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
