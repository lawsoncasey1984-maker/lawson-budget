<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lawson Budget</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, arrayUnion, increment, writeBatch, setDoc, getDoc } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDj8wkC8yyTsqwsvpCE_9tg2qzg2wP4zJQ",
            authDomain: "budget-tracker-edb31.firebaseapp.com",
            projectId: "budget-tracker-edb31",
            storageBucket: "budget-tracker-edb31.firebasestorage.app",
            messagingSenderId: "159580306838",
            appId: "1:159580306838:web:25ac3bacae328373dcb1b7",
            measurementId: "G-NPLMZ6JQ96"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.fs = { collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, arrayUnion, increment, writeBatch, setDoc, getDoc };
    </script>
</head>
<body style="margin:0; background: #0b0b0f; font-family: 'Inter', sans-serif; color: #ffffff; -webkit-font-smoothing: antialiased;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const formatMoney = (n) => "$" + Number(n).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        const CATEGORIES = ["Daily", "Bills", "Fun", "Household", "Savings", "Other"];
        const WEEKS = ["Week 1", "Week 2", "Week 3", "Week 4"];

        function App() {
            const [envelopes, setEnvelopes] = useState([]);
            const [bills, setBills] = useState([]);
            const [balances, setBalances] = useState({ bank: 0, credit: 0, savings: 0 });
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState("dashboard"); 
            const [activeId, setActiveId] = useState(null);
            
            const [showAdd, setShowAdd] = useState(false);
            const [showSpend, setShowSpend] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [showBillAdd, setShowBillAdd] = useState(false);
            
            const [newEnv, setNewEnv] = useState({ name: "", budget: "", category: "Daily" });
            const [newTx, setNewTx] = useState({ desc: "", amount: "" });
            const [newBill, setNewBill] = useState({ name: "", amount: "", week: "Week 1", dueDay: "" });
            const [editEnv, setEditEnv] = useState({ id: "", name: "", baseBudget: 0, category: "Daily" });

            // Derived State: Find the active envelope based on the ID
            const activeEnv = envelopes.find(e => e.id === activeId);

            useEffect(() => {
                if (!window.db) return;
                
                const unsubEnv = window.fs.onSnapshot(window.fs.collection(window.db, "envelopes"), (snapshot) => {
                    setEnvelopes(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubBills = window.fs.onSnapshot(window.fs.collection(window.db, "bills"), (snapshot) => {
                    setBills(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubBal = window.fs.onSnapshot(window.fs.doc(window.db, "meta", "balances"), (doc) => {
                    if (doc.exists()) setBalances(doc.data());
                    setLoading(false);
                });

                return () => { unsubEnv(); unsubBills(); unsubBal(); };
            }, []);

            const totalRemaining = envelopes.reduce((acc, env) => acc + ((env.budget || 0) - (env.spent || 0)), 0);
            const groupedEnvelopes = envelopes.reduce((acc, env) => {
                const cat = env.category || "Other";
                if (!acc[cat]) acc[cat] = [];
                acc[cat].push(env);
                return acc;
            }, {});

            const getCurrentWeek = () => {
                const day = new Date().getDate();
                if (day <= 7) return "Week 1";
                if (day <= 14) return "Week 2";
                if (day <= 21) return "Week 3";
                return "Week 4";
            };
            const currentWeekTag = getCurrentWeek();

            async function updateBalance(key, val) {
                const newBals = { ...balances, [key]: parseFloat(val) || 0 };
                setBalances(newBals);
                await window.fs.setDoc(window.fs.doc(window.db, "meta", "balances"), newBals);
            }

            async function handleUpdateEnv() {
                const envRef = window.fs.doc(window.db, "envelopes", editEnv.id);
                await window.fs.updateDoc(envRef, { 
                    name: editEnv.name,
                    baseBudget: parseFloat(editEnv.baseBudget) || 0,
                    budget: parseFloat(editEnv.baseBudget) || 0,
                    category: editEnv.category
                });
                setShowSettings(false);
            }

            async function handleAddBill() {
                if(!newBill.name || !newBill.amount || !newBill.dueDay) return;
                await window.fs.addDoc(window.fs.collection(window.db, "bills"), { 
                    ...newBill, 
                    amount: parseFloat(newBill.amount),
                    dueDay: parseInt(newBill.dueDay)
                });
                setShowBillAdd(false);
                setNewBill({ name: "", amount: "", week: "Week 1", dueDay: "" });
            }

            async function deleteBill(id) {
                if(confirm("Delete this bill?")) await window.fs.deleteDoc(window.fs.doc(window.db, "bills", id));
            }

            async function handleCreate() {
                if(!newEnv.name || !newEnv.budget) return;
                const b = parseFloat(newEnv.budget);
                await window.fs.addDoc(window.fs.collection(window.db, "envelopes"), {
                    name: newEnv.name, baseBudget: b, budget: b, spent: 0, 
                    category: newEnv.category, transactions: [], lastRefill: new Date().toLocaleDateString()
                });
                setShowAdd(false);
                setNewEnv({ name: "", budget: "", category: "Daily" });
            }

            async function handleSpend() {
                if (!activeId || !newTx.amount) return;
                const amt = parseFloat(newTx.amount);
                await window.fs.updateDoc(window.fs.doc(window.db, "envelopes", activeId), {
                    spent: window.fs.increment(amt),
                    transactions: window.fs.arrayUnion({ id: Date.now(), desc: newTx.desc || "No Description", amount: amt, date: new Date().toLocaleDateString() })
                });
                setShowSpend(false);
                setNewTx({ desc: "", amount: "" });
            }

            const styles = {
                app: { padding: "20px", maxWidth: "480px", margin: "0 auto", paddingBottom: "100px" },
                balGrid: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "10px", marginBottom: "20px" },
                balItem: { background: "rgba(255,255,255,0.05)", padding: "12px", borderRadius: "15px", textAlign: "center", border: "1px solid rgba(255,255,255,0.08)" },
                totalCard: { background: "linear-gradient(135deg, #6366f1 0%, #a855f7 100%)", padding: "24px", borderRadius: "20px", marginBottom: "20px" },
                card: { background: "rgba(255, 255, 255, 0.04)", padding: "20px", borderRadius: "20px", marginBottom: "12px", border: "1px solid rgba(255, 255, 255, 0.08)" },
                input: { width: "100%", padding: "14px", background: "#000", border: "1px solid #333", color: "#fff", borderRadius: "12px", marginBottom: "10px", boxSizing: "border-box", fontSize: "16px" }
            };

            if (loading) return <div style={{height: "100vh", display: "flex", alignItems: "center", justifyContent: "center"}}><h3>Syncing...</h3></div>;

            return (
                <div style={styles.app}>
                    <header style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px'}}>
                        <h1 style={{margin:0, fontSize: "22px", fontWeight: "800"}} onClick={() => setView("dashboard")}>Lawson</h1>
                        <div style={{display: 'flex', gap: '8px'}}>
                            <button onClick={() => setView("bills")} style={{background: view === "bills" ? "#6366f1" : "rgba(255,255,255,0.1)", border: "none", color: "#fff", padding: "8px 12px", borderRadius: "10px"}}>📅</button>
                            <button onClick={() => { setView("settings"); setShowSettings(true); }} style={{background: view === "settings" ? "#6366f1" : "rgba(255,255,255,0.1)", border: "none", color: "#fff", padding: "8px 12px", borderRadius: "10px"}}>⚙️</button>
                        </div>
                    </header>

                    {view === "dashboard" && (
                        <>
                            <div style={styles.balGrid}>
                                <div style={styles.balItem}><div style={{fontSize:"10px", color:"#888"}}>BANK</div><div style={{fontWeight:"700", fontSize:"13px"}}>{formatMoney(balances.bank)}</div></div>
                                <div style={styles.balItem}><div style={{fontSize:"10px", color:"#888"}}>CREDIT</div><div style={{fontWeight:"700", fontSize:"13px", color:"#ff6b6b"}}>{formatMoney(balances.credit)}</div></div>
                                <div style={styles.balItem}><div style={{fontSize:"10px", color:"#888"}}>SAVINGS</div><div style={{fontWeight:"700", fontSize:"13px", color:"#4ECDC4"}}>{formatMoney(balances.savings)}</div></div>
                            </div>
                            <div style={styles.totalCard}>
                                <div style={{fontSize: "12px", fontWeight: "600", opacity: 0.8}}>REMAINING CASH</div>
                                <div style={{fontSize: "36px", fontWeight: "800", marginTop: "4px"}}>{formatMoney(totalRemaining)}</div>
                            </div>
                            <button onClick={() => setShowAdd(true)} style={{width:"100%", padding:"14px", background:"#fff", color:"#000", border:"none", borderRadius:"15px", fontWeight:"700", marginBottom:"20px"}}>+ New Envelope</button>
                            
                            {Object.entries(groupedEnvelopes).map(([category, items]) => (
                                <div key={category}>
                                    <div style={{fontSize:"11px", fontWeight:"800", color:"#6366f1", marginBottom:"10px", letterSpacing:"1px"}}>{category.toUpperCase()}</div>
                                    {items.map(env => (
                                        <div key={env.id} style={styles.card} onClick={() => { setActiveId(env.id); setView("details"); }}>
                                            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                                                <span style={{fontWeight:"700"}}>{env.name}</span>
                                                <button style={{background:"none", border:"none", padding: "5px", fontSize:"16px"}} onClick={(e) => {
                                                    e.stopPropagation();
                                                    setEditEnv({id: env.id, name: env.name, baseBudget: env.baseBudget, category: env.category});
                                                    setShowSettings(true);
                                                }}>⚙️</button>
                                            </div>
                                            <div style={{fontSize: "26px", fontWeight: "800", margin: "10px 0", color: (env.budget - env.spent) < 0 ? "#ff6b6b" : "#fff"}}>{formatMoney(env.budget - env.spent)}</div>
                                            <button style={{background: "#fff", color: "#000", border: "none", borderRadius: "8px", padding: "6px 14px", fontWeight: "700", fontSize:"12px"}} onClick={(e) => { e.stopPropagation(); setActiveId(env.id); setShowSpend(true); }}>Spend</button>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </>
                    )}

                    {view === "bills" && (
                        <div>
                            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"20px"}}>
                                <h2 style={{margin:0}}>Monthly Bills</h2>
                                <button onClick={() => setShowBillAdd(true)} style={{background:"#6366f1", border:"none", color:"#fff", padding:"8px 15px", borderRadius:"10px", fontWeight:"600"}}>+ Add Bill</button>
                            </div>
                            {WEEKS.map(week => (
                                <div key={week} style={{marginBottom:"25px", borderLeft: week === currentWeekTag ? "3px solid #a855f7" : "none", paddingLeft: "10px"}}>
                                    <div style={{color: week === currentWeekTag ? "#a855f7" : "#555", fontWeight:"800", fontSize:"13px"}}>{week.toUpperCase()}</div>
                                    {bills.filter(b => b.week === week).sort((a,b) => a.dueDay - b.dueDay).map(bill => (
                                        <div key={bill.id} style={{...styles.card, display:"flex", justifyContent:"space-between", alignItems:"center", padding:"15px", marginBottom:"8px"}}>
                                            <div style={{fontWeight:"600"}}>{bill.dueDay} - {bill.name}</div>
                                            <div style={{display: 'flex', alignItems: 'center', gap: '10px'}}>
                                                <div style={{fontWeight:"700"}}>{formatMoney(bill.amount)}</div>
                                                <button onClick={() => deleteBill(bill.id)} style={{background: 'none', border: 'none', color: '#ff6b6b', fontSize: '18px'}}>✕</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Modals */}
                    {showBillAdd && (
                        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", display:"flex", alignItems:"flex-end", zIndex:1000}}>
                            <div style={{background:"#16161e", width:"100%", padding:"32px", borderRadius:"32px 32px 0 0", borderTop:"1px solid #333"}}>
                                <h3 style={{marginTop:0}}>Add Monthly Bill</h3>
                                <input style={styles.input} placeholder="Bill Name" value={newBill.name} onChange={e => setNewBill({...newBill, name: e.target.value})} />
                                <input style={styles.input} type="number" placeholder="Amount ($)" value={newBill.amount} onChange={e => setNewBill({...newBill, amount: e.target.value})} />
                                <input style={styles.input} type="number" placeholder="Due Day (1-31)" value={newBill.dueDay} onChange={e => setNewBill({...newBill, dueDay: e.target.value})} />
                                <select style={styles.input} value={newBill.week} onChange={e => setNewBill({...newBill, week: e.target.value})}>
                                    {WEEKS.map(w => <option key={w} value={w}>{w}</option>)}
                                </select>
                                <button style={{width:"100%", padding:"16px", background:"#6366f1", color:"#fff", borderRadius:"15px", border:"none", fontWeight:"800"}} onClick={handleAddBill}>Save Bill</button>
                                <button onClick={() => setShowBillAdd(false)} style={{width:"100%", background:"none", border:"none", color:"#888", marginTop:"15px"}}>Cancel</button>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", display:"flex", alignItems:"flex-end", zIndex:1000}}>
                            <div style={{background:"#16161e", width:"100%", padding:"32px", borderRadius:"32px 32px 0 0", borderTop:"1px solid #333"}}>
                                <h3 style={{marginTop:0}}>{view === "settings" ? "Global Settings" : "Envelope Settings"}</h3>
                                {view === "settings" ? (
                                    <>
                                        <label style={{fontSize:"11px", color:"#888"}}>BANK ACCOUNT</label>
                                        <input style={styles.input} type="number" value={balances.bank} onChange={e => updateBalance("bank", e.target.value)} />
                                        <label style={{fontSize:"11px", color:"#888"}}>CREDIT CARD</label>
                                        <input style={styles.input} type="number" value={balances.credit} onChange={e => updateBalance("credit", e.target.value)} />
                                        <label style={{fontSize:"11px", color:"#888"}}>SAVINGS</label>
                                        <input style={styles.input} type="number" value={balances.savings} onChange={e => updateBalance("savings", e.target.value)} />
                                        <button onClick={() => { setShowSettings(false); setView("dashboard"); }} style={{width:"100%", padding:"16px", background:"#fff", color:"#000", border:"none", borderRadius:"15px", fontWeight:"700"}}>Done</button>
                                    </>
                                ) : (
                                    <>
                                        <input style={styles.input} value={editEnv.name} onChange={e => setEditEnv({...editEnv, name: e.target.value})} />
                                        <label style={{fontSize:"11px", color:"#888"}}>WEEKLY LIMIT ($)</label>
                                        <input style={styles.input} type="number" value={editEnv.baseBudget} onChange={e => setEditEnv({...editEnv, baseBudget: e.target.value})} />
                                        <button style={{width:"100%", padding:"16px", background:"#6366f1", color:"#fff", borderRadius:"15px", border:"none", fontWeight:"800"}} onClick={handleUpdateEnv}>Save Changes</button>
                                        <button onClick={async () => { if(confirm("Delete envelope?")) { await window.fs.deleteDoc(window.fs.doc(window.db, "envelopes", editEnv.id)); setShowSettings(false); } }} style={{width:"100%", padding:"16px", background:"rgba(255,107,107,0.1)", color:"#ff6b6b", border:"none", borderRadius:"15px", fontWeight:"800", marginTop:"10px"}}>Delete Envelope</button>
                                    </>
                                )}
                                <button onClick={() => { setShowSettings(false); if(view === "settings") setView("dashboard"); }} style={{width:"100%", background:"none", border:"none", color:"#888", marginTop:"15px"}}>Cancel</button>
                            </div>
                        </div>
                    )}

                    {showAdd && (
                        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", display:"flex", alignItems:"flex-end", zIndex:1000}}>
                            <div style={{background:"#16161e", width:"100%", padding:"32px", borderRadius:"32px 32px 0 0", borderTop:"1px solid #333"}}>
                                <h3>New Envelope</h3>
                                <input style={styles.input} placeholder="Name" onChange={e => setNewEnv({...newEnv, name: e.target.value})} />
                                <input style={styles.input} type="number" placeholder="Weekly Budget" onChange={e => setNewEnv({...newEnv, budget: e.target.value})} />
                                <select style={styles.input} onChange={e => setNewEnv({...newEnv, category: e.target.value})}>
                                    {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <button style={{width:"100%", padding:"16px", background:"#fff", color:"#000", borderRadius:"15px", border:"none", fontWeight:"800"}} onClick={handleCreate}>Create</button>
                                <button onClick={() => setShowAdd(false)} style={{width:"100%", background:"none", border:"none", color:"#888", marginTop:"15px"}}>Cancel</button>
                            </div>
                        </div>
                    )}

                    {showSpend && activeEnv && (
                        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", display:"flex", alignItems:"flex-end", zIndex:1000}}>
                            <div style={{background:"#16161e", width:"100%", padding:"32px", borderRadius:"32px 32px 0 0", borderTop:"1px solid #333"}}>
                                <h3>Spend from {activeEnv.name}</h3>
                                <input style={styles.input} placeholder="Description" value={newTx.desc} onChange={e => setNewTx({...newTx, desc: e.target.value})} />
                                <input style={styles.input} type="number" placeholder="Amount" value={newTx.amount} onChange={e => setNewTx({...newTx, amount: e.target.value})} />
                                <button style={{width:"100%", padding:"16px", background:"#fff", color:"#000", borderRadius:"15px", border:"none", fontWeight:"800"}} onClick={handleSpend}>Confirm</button>
                                <button onClick={() => setShowSpend(false)} style={{width:"100%", background:"none", border:"none", color:"#888", marginTop:"15px"}}>Cancel</button>
                            </div>
                        </div>
                    )}

                    {view === "details" && activeEnv && (
                        <div>
                            <button onClick={() => setView("dashboard")} style={{background:"none", border:"none", color:"#6366f1", marginBottom:"20px", fontWeight:"600"}}>← Back</button>
                            <h2>{activeEnv.name} History</h2>
                            {activeEnv.transactions?.slice().reverse().map(t => (
                                <div key={t.id} style={{...styles.card, display:"flex", justifyContent:"space-between", alignItems: 'center'}}>
                                    <div>
                                        <div style={{fontWeight: '600'}}>{t.desc}</div>
                                        <div style={{fontSize: '11px', color: '#888'}}>{t.date}</div>
                                    </div>
                                    <div style={{display: 'flex', alignItems: 'center', gap: '10px'}}>
                                        <div style={{color:"#ff6b6b", fontWeight:"800"}}>-{formatMoney(t.amount)}</div>
                                        <button onClick={async (e) => {
                                            e.stopPropagation();
                                            if(confirm("Delete transaction?")) {
                                                const envRef = window.fs.doc(window.db, "envelopes", activeEnv.id);
                                                await window.fs.updateDoc(envRef, {
                                                    spent: window.fs.increment(-t.amount),
                                                    transactions: activeEnv.transactions.filter(item => item.id !== t.id)
                                                });
                                            }
                                        }} style={{background:'none', border:'none', color:'#444'}}>✕</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
