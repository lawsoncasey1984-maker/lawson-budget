<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lawson Budget</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, arrayUnion, increment, writeBatch } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDj8wkC8yyTsqwsvpCE_9tg2qzg2wP4zJQ",
            authDomain: "budget-tracker-edb31.firebaseapp.com",
            projectId: "budget-tracker-edb31",
            storageBucket: "budget-tracker-edb31.firebasestorage.app",
            messagingSenderId: "159580306838",
            appId: "1:159580306838:web:25ac3bacae328373dcb1b7",
            measurementId: "G-NPLMZ6JQ96"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.fs = { collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, arrayUnion, increment, writeBatch };
    </script>
</head>
<body style="margin:0; background: #0b0b0f; font-family: 'Inter', sans-serif; color: #ffffff; -webkit-font-smoothing: antialiased;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const formatMoney = (n) => "$" + Number(n).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        const CATEGORIES = ["Daily", "Bills", "Fun", "Household", "Savings", "Other"];

        function App() {
            const [envelopes, setEnvelopes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState("dashboard");
            const [activeId, setActiveId] = useState(null);
            
            const [showAdd, setShowAdd] = useState(false);
            const [showSpend, setShowSpend] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            
            const [newEnv, setNewEnv] = useState({ name: "", budget: "", category: "Daily" });
            const [newTx, setNewTx] = useState({ desc: "", amount: "" });
            const [editEnv, setEditEnv] = useState({ id: "", name: "", baseBudget: 0, category: "Daily" });

            useEffect(() => {
                if (!window.db) return;
                const unsub = window.fs.onSnapshot(window.fs.collection(window.db, "envelopes"), (snapshot) => {
                    const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setEnvelopes(docs);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            const activeEnv = envelopes.find(e => e.id === activeId);
            const totalRemaining = envelopes.reduce((acc, env) => acc + (env.budget - env.spent), 0);
            
            const groupedEnvelopes = envelopes.reduce((acc, env) => {
                const cat = env.category || "Other";
                if (!acc[cat]) acc[cat] = [];
                acc[cat].push(env);
                return acc;
            }, {});

            async function handleDeleteTx(txId, amount) {
                if (!confirm("Delete this transaction? The amount will be credited back to the envelope.")) return;
                
                const envRef = window.fs.doc(window.db, "envelopes", activeId);
                const updatedTransactions = activeEnv.transactions.filter(t => t.id !== txId);
                
                await window.fs.updateDoc(envRef, {
                    spent: window.fs.increment(-amount),
                    transactions: updatedTransactions
                });
            }

            async function handleRefillAll() {
                if (!confirm("Refill ALL envelopes and rollover remaining balances?")) return;
                const batch = window.fs.writeBatch(window.db);
                envelopes.forEach((env) => {
                    const remaining = (env.budget || 0) - (env.spent || 0);
                    batch.update(window.fs.doc(window.db, "envelopes", env.id), {
                        budget: (env.baseBudget || 0) + (remaining > 0 ? remaining : 0),
                        spent: 0,
                        transactions: [],
                        lastRefill: new Date().toLocaleDateString()
                    });
                });
                await batch.commit();
            }

            async function handleCreate() {
                if (!newEnv.name || !newEnv.budget) return;
                const b = parseFloat(newEnv.budget);
                await window.fs.addDoc(window.fs.collection(window.db, "envelopes"), {
                    name: newEnv.name, baseBudget: b, budget: b, spent: 0, 
                    category: newEnv.category, transactions: [], lastRefill: new Date().toLocaleDateString()
                });
                setShowAdd(false);
            }

            async function handleSpend() {
                const amt = parseFloat(newTx.amount);
                await window.fs.updateDoc(window.fs.doc(window.db, "envelopes", activeId), {
                    spent: window.fs.increment(amt),
                    transactions: window.fs.arrayUnion({ id: Date.now(), desc: newTx.desc, amount: amt, date: new Date().toLocaleDateString() })
                });
                setShowSpend(false);
                setNewTx({ desc: "", amount: "" });
            }

            const styles = {
                app: { padding: "24px", maxWidth: "480px", margin: "0 auto", paddingBottom: "120px" },
                totalCard: { background: "linear-gradient(135deg, #6366f1 0%, #a855f7 100%)", padding: "30px", borderRadius: "24px", marginBottom: "20px" },
                card: { background: "rgba(255, 255, 255, 0.04)", backdropFilter: "blur(10px)", padding: "20px", borderRadius: "20px", marginBottom: "16px", border: "1px solid rgba(255, 255, 255, 0.08)" },
                categoryHeader: { fontSize: "12px", textTransform: "uppercase", letterSpacing: "1.5px", color: "#6366f1", fontWeight: "800", margin: "24px 0 12px 8px" },
                input: { width: "100%", padding: "16px", background: "#000", border: "1px solid #333", color: "#fff", borderRadius: "12px", marginBottom: "12px", fontSize: "16px", outline: "none" },
                txDeleteBtn: { background: "rgba(239, 68, 68, 0.15)", border: "none", color: "#ef4444", borderRadius: "8px", padding: "8px 12px", fontSize: "14px", fontWeight: "700", cursor: "pointer", marginLeft: "12px" }
            };

            if (loading) return <div style={{height: "100vh", display: "flex", alignItems: "center", justifyContent: "center"}}><h3>Syncing...</h3></div>;

            return (
                <div style={styles.app}>
                    <header style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px'}}>
                        <h1 style={{margin:0, fontSize: "24px", fontWeight: "800"}}>Lawson</h1>
                        <div style={{display: 'flex', gap: '10px'}}>
                            <button onClick={() => setView(view === "stats" ? "dashboard" : "stats")} style={{background: "rgba(255,255,255,0.1)", border: "none", color: "#fff", padding: "8px 12px", borderRadius: "10px"}}>{view === "stats" ? "🏠" : "📊"}</button>
                            <button onClick={() => setShowAdd(true)} style={{background: "rgba(255,255,255,0.1)", border: "none", color: "#fff", padding: "8px 12px", borderRadius: "10px"}}>+ New</button>
                        </div>
                    </header>

                    {view === "dashboard" ? (
                        <>
                            <div style={styles.totalCard}>
                                <div style={{fontSize: "13px", fontWeight: "600", opacity: 0.8}}>TOTAL AVAILABLE</div>
                                <div style={{fontSize: "42px", fontWeight: "800", marginTop: "8px"}}>{formatMoney(totalRemaining)}</div>
                            </div>

                            <button onClick={handleRefillAll} style={{width: "100%", background: "rgba(16, 185, 129, 0.15)", color: "#10b981", border: "1px solid #10b981", borderRadius: "14px", padding: "12px", fontWeight: "700", marginBottom: "12px", cursor: "pointer"}}>⚡ Refill All Envelopes</button>

                            {Object.entries(groupedEnvelopes).map(([category, items]) => (
                                <div key={category}>
                                    <div style={styles.categoryHeader}>{category}</div>
                                    {items.map(env => (
                                        <div key={env.id} style={styles.card} onClick={() => { setActiveId(env.id); setView("details"); }}>
                                            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                                                <span style={{fontWeight:"700", color: "#a1a1aa"}}>{env.name}</span>
                                                <button style={{background:"none", border:"none", fontSize: "20px"}} onClick={(e) => { e.stopPropagation(); setEditEnv({id: env.id, name: env.name, baseBudget: env.baseBudget, category: env.category}); setShowSettings(true); }}>⚙️</button>
                                            </div>
                                            <div style={{fontSize: "28px", fontWeight: "700", margin: "8px 0", color: (env.budget - env.spent) < 0 ? "#ef4444" : "#fff"}}>{formatMoney(env.budget - env.spent)}</div>
                                            <button style={{background: "#fff", color: "#000", border: "none", borderRadius: "8px", padding: "6px 14px", fontWeight: "700"}} onClick={(e) => { e.stopPropagation(); setActiveId(env.id); setShowSpend(true); }}>Spend</button>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </>
                    ) : view === "details" ? (
                        <div>
                            <button onClick={() => setView("dashboard")} style={{background:"none", border:"none", color:"#6366f1", fontWeight:"600", marginBottom: "24px", fontSize: "16px"}}>← Dashboard</button>
                            <h2 style={{fontSize: "32px", margin: "0 0 8px 0"}}>{activeEnv?.name}</h2>
                            <p style={{color: "#71717a", marginBottom: "32px"}}>{formatMoney(activeEnv?.budget - activeEnv?.spent)} remaining</p>
                            
                            <h3 style={{fontSize: "14px", color: "#52525b", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "16px"}}>Transactions</h3>
                            {activeEnv?.transactions?.slice().reverse().map(t => (
                                <div key={t.id} style={{...styles.card, display:"flex", justifyContent:"space-between", alignItems: "center", marginBottom: "12px", padding: "16px"}}>
                                    <div style={{flex: 1}}>
                                        <div style={{fontWeight: "600"}}>{t.desc}</div>
                                        <div style={{fontSize:"12px", color:"#71717a"}}>{t.date}</div>
                                    </div>
                                    <div style={{fontWeight: "700", color: "#ef4444"}}>-{formatMoney(t.amount)}</div>
                                    <button style={styles.txDeleteBtn} onClick={() => handleDeleteTx(t.id, t.amount)}>✕</button>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div>
                             <h2 style={{fontSize: "28px", marginBottom: "24px"}}>Category Spending</h2>
                             {Object.entries(groupedEnvelopes).map(([category, items]) => {
                                 const catSpent = items.reduce((s, i) => s + i.spent, 0);
                                 const catBudget = items.reduce((s, i) => s + i.budget, 0);
                                 const pct = (catSpent / catBudget) * 100;
                                 return (
                                     <div key={category} style={{marginBottom: "32px"}}>
                                         <div style={{display: "flex", justifyContent: "space-between", marginBottom: "8px"}}>
                                             <span style={{fontWeight: "700"}}>{category}</span>
                                             <span style={{color: pct > 100 ? "#ef4444" : "#a1a1aa"}}>{formatMoney(catSpent)} spent</span>
                                         </div>
                                         <div style={{height: "12px", background: "rgba(255,255,255,0.05)", borderRadius: "6px", overflow: "hidden"}}>
                                             <div style={{height: "100%", width: `${Math.min(100, pct)}%`, background: pct > 100 ? "#ef4444" : "#6366f1", transition: "width 1s"}} />
                                         </div>
                                     </div>
                                 );
                             })}
                        </div>
                    )}

                    {/* Modals for Add/Spend/Settings */}
                    {(showAdd || showSpend || showSettings) && (
                        <div style={{position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", backdropFilter: "blur(8px)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 1000}} onClick={() => { setShowAdd(false); setShowSpend(false); setShowSettings(false); }}>
                             <div style={{background: "#16161e", width: "100%", maxWidth: "480px", padding: "32px", borderRadius: "32px 32px 0 0"}} onClick={e => e.stopPropagation()}>
                                {showAdd && <>
                                    <h3 style={{marginTop: 0, fontSize: "24px"}}>New Envelope</h3>
                                    <input style={styles.input} placeholder="Name" onChange={e => setNewEnv({...newEnv, name: e.target.value})} />
                                    <input style={styles.input} type="number" placeholder="Weekly Budget" onChange={e => setNewEnv({...newEnv, budget: e.target.value})} />
                                    <select style={{width:"100%", padding:"16px", background:"#000", border:"1px solid #333", color:"#fff", borderRadius:"12px", marginBottom:"20px", fontSize:"16px"}} value={newEnv.category} onChange={e => setNewEnv({...newEnv, category: e.target.value})}>
                                        {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <button style={{width:"100%", padding:"16px", background:"#fff", color:"#000", border:"none", borderRadius:"12px", fontWeight:"700"}} onClick={handleCreate}>Create</button>
                                </>}
                                {showSpend && <>
                                    <h3 style={{marginTop: 0, fontSize: "24px"}}>Add Purchase</h3>
                                    <input style={styles.input} placeholder="Description" onChange={e => setNewTx({...newTx, desc: e.target.value})} />
                                    <input style={styles.input} type="number" placeholder="Amount" onChange={e => setNewTx({...newTx, amount: e.target.value})} />
                                    <button style={{width:"100%", padding:"16px", background:"#fff", color:"#000", border:"none", borderRadius:"12px", fontWeight:"700"}} onClick={handleSpend}>Confirm</button>
                                </>}
                                {showSettings && <>
                                    <h3 style={{marginTop: 0, fontSize: "24px"}}>Settings</h3>
                                    <input style={styles.input} value={editEnv.name} onChange={e => setEditEnv({...editEnv, name: e.target.value})} />
                                    <input style={styles.input} type="number" value={editEnv.baseBudget} onChange={e => setEditEnv({...editEnv, baseBudget: e.target.value})} />
                                    <select style={{width:"100%", padding:"16px", background:"#000", border:"1px solid #333", color:"#fff", borderRadius:"12px", marginBottom:"20px", fontSize:"16px"}} value={editEnv.category} onChange={e => setEditEnv({...editEnv, category: e.target.value})}>
                                        {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <button style={{width:"100%", padding:"16px", background:"#fff", color:"#000", border:"none", borderRadius:"12px", fontWeight:"700"}} onClick={async () => {
                                        await window.fs.updateDoc(window.fs.doc(window.db, "envelopes", editEnv.id), { 
                                            name: editEnv.name, 
                                            baseBudget: parseFloat(editEnv.baseBudget),
                                            category: editEnv.category
                                        });
                                        setShowSettings(false);
                                    }}>Save</button>
                                    <button style={{width:"100%", padding:"16px", background:"rgba(239, 68, 68, 0.1)", color:"#ef4444", border:"none", borderRadius:"12px", fontWeight:"700", marginTop:"10px"}} onClick={async () => {
                                        if(confirm("Delete?")) { await window.fs.deleteDoc(window.fs.doc(window.db, "envelopes", editEnv.id)); setShowSettings(false); setView("dashboard"); }
                                    }}>Delete Envelope</button>
                                </>}
                             </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
